services:
  account-service:
    build: ./account-service
    container_name: account-service
    # No ports exposed — internal only, reachable only by event-gateway
    # via Docker's internal network as http://account-service:8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  event-gateway:
    build: ./event-gateway
    container_name: event-gateway
    ports:
      - "8000:8000"
    environment:
      - ACCOUNT_SERVICE_URL=http://account-service:8001
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
